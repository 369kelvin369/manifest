<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしのマニフェスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fdf6e3;
    --accent-gold: #b87d00;
    --accent-red: #b02a1a;
    --accent-orange: #d45500;
    --forgive-color: #b02a1a;
    --affirm-color: #b87d00;
    --text-main: #0e0a04;
    --text-sub: #3a2208;
    --text-muted: #7a5a20;
    --forgive-bg: rgba(176,42,26,0.10);
    --affirm-bg: rgba(184,125,0,0.13);
    --divider: rgba(184,125,0,0.45);
    --card-shadow: 0 6px 28px rgba(100,50,0,0.18), 0 1px 4px rgba(100,50,0,0.10);
    --card-border: 1.5px solid rgba(140,80,0,0.22);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── 背景装飾 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,101,10,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(212,150,10,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── ヘッダー ── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 20px 12px;
    background: linear-gradient(to bottom, var(--bg) 70%, transparent);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .category-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent-red);
    font-weight: 700;
  }

  .progress-text {
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    font-weight: 400;
  }

  /* ── プログレスバー ── */
  .progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(212,150,10,0.15);
    z-index: 200;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--accent-red), var(--accent-gold));
    transition: width 0.4s ease;
  }

  /* ── カードエリア ── */
  .card-viewport {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px 100px;
    position: relative;
    z-index: 1;
    overflow-y: auto;
  }

  .card {
    display: none;
    flex-direction: column;
    gap: 0;
    max-width: 480px;
    width: 100%;
    animation: fadeIn 0.4s ease;
    background: #fff;
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    border: var(--card-border);
    overflow: hidden;
  }

  .card.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 許しブロック */
  .forgive-block {
    padding: 28px 26px 24px;
    background: var(--forgive-bg);
    border-bottom: 1.5px solid rgba(176,42,26,0.22);
  }

  .block-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .forgive-block .block-label { color: var(--forgive-color); }
  .affirm-block .block-label  { color: var(--affirm-color); }

  .forgive-block p {
    font-size: 14px;
    line-height: 2.1;
    color: #1c0a06;
    font-weight: 400;
  }

  /* 仕切り */
  .card-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 26px;
    background: #fff;
    height: 36px;
    border-top: 1px solid rgba(140,80,0,0.12);
    border-bottom: 1px solid rgba(140,80,0,0.12);
  }
  .card-divider::before,
  .card-divider::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: var(--divider);
  }
  .card-divider span {
    font-size: 14px;
    color: var(--accent-gold);
    font-weight: 700;
  }

  /* マニフェストブロック */
  .affirm-block {
    padding: 24px 26px 28px;
    background: var(--affirm-bg);
  }

  .affirm-block p {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    line-height: 2.1;
    color: #0a0600;
    font-weight: 700;
  }

  /* ── ナビゲーション ── */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px 30px;
    background: linear-gradient(to top, var(--bg) 65%, transparent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }

  .nav-btn {
    background: #fff;
    border: 1px solid rgba(212,150,10,0.3);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 12px 24px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    min-width: 80px;
    box-shadow: 0 2px 8px rgba(212,150,10,0.1);
  }

  .nav-btn:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
  }

  .nav-btn.next {
    background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
    border: none;
    color: #fff;
    padding: 12px 32px;
    font-weight: 400;
    box-shadow: 0 4px 16px rgba(201,58,42,0.3);
  }

  .nav-btn.next:hover {
    box-shadow: 0 6px 20px rgba(201,58,42,0.4);
    transform: translateY(-1px);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
    box-shadow: none;
    transform: none;
  }

  /* ── カテゴリ選択メニュー ── */
  .menu-btn {
    background: #fff;
    border: 1px solid rgba(212,150,10,0.3);
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 40px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(212,150,10,0.1);
  }
  .menu-btn:hover {
    color: var(--accent-gold);
    border-color: var(--accent-gold);
  }

  .menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,248,230,0.97);
    z-index: 300;
    padding: 60px 24px 40px;
    overflow-y: auto;
  }
  .menu-overlay.open { display: block; }

  .menu-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--accent-red);
    letter-spacing: 0.2em;
    margin-bottom: 24px;
    text-align: center;
  }

  .menu-close {
    position: absolute;
    top: 20px; right: 24px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
  }

  .menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .menu-item {
    padding: 14px 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid transparent;
  }
  .menu-item:hover {
    background: rgba(212,150,10,0.08);
    border-color: rgba(212,150,10,0.2);
  }

  .menu-item-num {
    font-size: 11px;
    color: var(--accent-red);
    letter-spacing: 0.1em;
    min-width: 20px;
    font-weight: 400;
  }
  .menu-item-name {
    font-size: 14px;
    color: var(--text-main);
  }
  .menu-item-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── 完了画面 ── */
  .complete-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #fff8e6 0%, #fff3d6 100%);
    z-index: 400;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px;
    text-align: center;
  }
  .complete-screen.show { display: flex; }

  .complete-icon { font-size: 52px; }
  .complete-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    color: var(--accent-red);
    line-height: 1.9;
  }
  .complete-sub {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 2.2;
  }
  .complete-restart {
    margin-top: 16px;
    background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
    border: none;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 14px 36px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(201,58,42,0.3);
    letter-spacing: 0.05em;
  }
  .complete-restart:hover {
    box-shadow: 0 6px 20px rgba(201,58,42,0.4);
    transform: translateY(-1px);
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .nav-btn, .complete-restart { transition: none; }
  }
</style>
</head>
<body>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar"></div>
</div>

<div class="header">
  <span class="category-label" id="categoryLabel">❶ 自己価値・存在感</span>
  <span class="progress-text" id="progressText">1 / 1</span>
</div>

<div class="card-viewport" id="cardViewport"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 前へ</button>
  <button class="menu-btn" onclick="openMenu()">☰</button>
  <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">次へ →</button>
</div>

<!-- カテゴリメニュー -->
<div class="menu-overlay" id="menuOverlay">
  <button class="menu-close" onclick="closeMenu()">✕</button>
  <p class="menu-title">カテゴリを選ぶ</p>
  <ul class="menu-list" id="menuList"></ul>
</div>

<!-- 完了画面 -->
<div class="complete-screen" id="completeScreen">
  <div class="complete-icon">✦</div>
  <p class="complete-title">すべて読み終わりました。<br>わたしはすでに、大丈夫です。</p>
  <p class="complete-sub">今日もわたしをわたしに<br>許してくれてありがとう。</p>
  <button class="complete-restart" onclick="restart()">最初から読む</button>
</div>

// ── フラット化 ──
let allCards = [];
let categoryStartIndex = [];

data.forEach((cat, ci) => {
  categoryStartIndex.push(allCards.length);
  cat.cards.forEach((card, ki) => {
    allCards.push({ ...card, category: cat.category, catIndex: ci, cardIndex: ki });
  });
});

let current = 0;

function buildCards() {
  const vp = document.getElementById('cardViewport');
  allCards.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'card' + (i === 0 ? ' active' : '');
    div.id = 'card-' + i;
    div.innerHTML = `
      <div class="forgive-block">
        <div class="block-label">許し・受け入れ</div>
        <p>${c.forgive}</p>
      </div>
      <div class="card-divider"><span>✦</span></div>
      <div class="affirm-block">
        <div class="block-label">マニフェスト</div>
        <p>${c.affirm}</p>
      </div>
    `;
    vp.appendChild(div);
  });
}

function buildMenu() {
  const list = document.getElementById('menuList');
  data.forEach((cat, ci) => {
    const li = document.createElement('li');
    li.className = 'menu-item';
    li.innerHTML = `
      <span class="menu-item-num">${ci + 1}</span>
      <span class="menu-item-name">${cat.category}</span>
      <span class="menu-item-count">${cat.cards.length}枚</span>
    `;
    li.onclick = () => {
      jumpTo(categoryStartIndex[ci]);
      closeMenu();
    };
    list.appendChild(li);
  });
}

function update() {
  const c = allCards[current];
  document.querySelectorAll('.card').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  document.getElementById('categoryLabel').textContent = c.category;
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + allCards.length;
  document.getElementById('progressBar').style.width = ((current + 1) / allCards.length * 100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').textContent = current === allCards.length - 1 ? '完了 ✦' : '次へ →';
}

function navigate(dir) {
  if (dir === 1 && current === allCards.length - 1) {
    document.getElementById('completeScreen').classList.add('show');
    return;
  }
  const next = current + dir;
  if (next < 0 || next >= allCards.length) return;
  current = next;
  update();
}

function jumpTo(index) {
  current = index;
  update();
}

function openMenu()  { document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }

function restart() {
  document.getElementById('completeScreen').classList.remove('show');
  current = 0;
  update();
}

// ── 初期化 ──
buildCards();
buildMenu();
update();
