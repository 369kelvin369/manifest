<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="わたしへ">
<title>わたしへ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    /* 温かい朝の光をベースにしたパレット */
    --bg-1: #fbf3e9;      /* 温かいクリーム */
    --bg-2: #fde8d8;      /* ほんのりピーチ */
    --bg-3: #fce0d4;      /* サーモンの淡い影 */
    --surface: #fff8ee;
    --card-bg: rgba(255, 250, 240, 0.78);
    --card-edge: rgba(193, 109, 75, 0.18);
    --accent-rose: #c4716a;     /* 落ち着いた薔薇色 */
    --accent-coral: #d97757;    /* 温かいテラコッタ */
    --accent-honey: #c89456;    /* 蜜のような金茶 */
    --accent-soft: #e8b4a0;     /* 淡いサンセット */
    --text-main: #4a2f1e;       /* 深いブラウン */
    --text-sub: #87543d;        /* 茶褐色 */
    --text-muted: #b89279;      /* 薄いブラウン */
    --forgive-label: #c4716a;   /* 薔薇色 */
    --affirm-label: #c4805a;    /* 蜜キャラメル */
    --divider: rgba(193, 109, 75, 0.15);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-1);
    color: var(--text-main);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse at 15% 5%, rgba(250, 200, 175, 0.55) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 95%, rgba(232, 180, 160, 0.45) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 230, 200, 0.35) 0%, transparent 70%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
    background-attachment: fixed;
    height: 100vh;
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── ヘッダー ── */
  .header {
    position: fixed;
    top: env(safe-area-inset-top, 0);
    left: 0; right: 0;
    z-index: 100;
    padding: 14px 22px 16px;
    background: linear-gradient(to bottom, var(--bg-1) 60%, rgba(251,243,233,0.6) 90%, transparent);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    pointer-events: none;
  }

  .header-left {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: baseline;
    gap: 8px;
    overflow: hidden;
  }

  .cat-no {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--accent-coral);
    letter-spacing: 0.05em;
    opacity: 0.9;
    flex-shrink: 0;
  }

  .cat-divider {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .cat-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.15em;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .progress-text {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    font-feature-settings: "tnum";
    margin-right: 36px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* プログレス細線 */
  .progress-bar {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 66px);
    left: 22px; right: 22px;
    height: 1px;
    background: rgba(193, 109, 75, 0.12);
    z-index: 99;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-rose), var(--accent-honey));
    width: 0;
    transition: width 0.6s ease;
  }

  /* ── メイン: カード ── */
  .stage {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    height: 100vh;
    height: 100dvh;
    padding-top: calc(env(safe-area-inset-top, 0px) + 72px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 78px);
    padding-left: 14px;
    padding-right: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    width: 100%;
    max-width: 520px;
    height: 100%;
    overflow-y: auto;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-edge);
    border-radius: 16px;
    padding: 20px 22px 24px;
    box-shadow:
      0 16px 40px rgba(193, 109, 75, 0.10),
      0 4px 14px rgba(193, 109, 75, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 0.7);
    animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    scrollbar-width: thin;
    scrollbar-color: var(--accent-coral) transparent;
    -webkit-overflow-scrolling: touch;
  }

  .card::-webkit-scrollbar { width: 3px; }
  .card::-webkit-scrollbar-thumb {
    background: rgba(193, 109, 75, 0.25);
    border-radius: 4px;
  }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .topic {
    font-family: 'Noto Serif JP', serif;
    font-size: 12.5px;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--divider);
    line-height: 1.65;
  }

  .block { margin-bottom: 16px; }
  .block:last-of-type { margin-bottom: 0; }

  .block-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .block-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--divider);
  }

  .label-forgive { color: var(--forgive-label); }
  .label-affirm { color: var(--affirm-label); }

  .block-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    line-height: 1.85;
    color: var(--text-main);
    letter-spacing: 0.01em;
    font-weight: 400;
  }

  .block-affirm .block-text {
    color: #5c3a1f;
    font-weight: 500;
  }

  /* ── 下部ナビ ── */
  .nav {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 0);
    left: 0; right: 0;
    height: 56px;
    z-index: 100;
    background: var(--bg-3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--text-sub);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 12px 8px;
    transition: color 0.2s;
  }
  .nav-btn:disabled {
    color: var(--text-muted);
    opacity: 0.4;
  }
  .nav-btn:not(:disabled):hover,
  .nav-btn:not(:disabled):active {
    color: var(--accent-coral);
  }

  .nav-tap-hint {
    font-family: 'Noto Serif JP', serif;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
  }

  /* タップ領域 (中央) */
  .tap-area {
    position: fixed;
    inset: 0;
    z-index: 1;
    cursor: pointer;
  }

  /* ── メニュー (カテゴリ選択) ── */
  .menu-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    right: 22px;
    z-index: 110;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--accent-coral);
    pointer-events: auto;
  }

  .menu-btn svg {
    display: block;
    width: 20px;
    height: 20px;
  }

  .menu-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(251, 243, 233, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    overflow-y: auto;
    padding: calc(env(safe-area-inset-top, 0px) + 60px) 22px calc(env(safe-area-inset-bottom, 0px) + 30px);
  }

  .menu-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .menu-close {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    right: 22px;
    background: none;
    border: none;
    color: var(--accent-coral);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 6px;
  }

  .menu-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--text-sub);
    text-align: center;
    letter-spacing: 0.2em;
    margin-bottom: 28px;
  }

  .menu-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .menu-action-btn {
    background: rgba(255, 250, 240, 0.5);
    border: 1px solid var(--card-edge);
    color: var(--accent-coral);
    padding: 12px 24px;
    border-radius: 999px;
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .menu-action-btn:hover,
  .menu-action-btn:active {
    background: rgba(217, 119, 87, 0.10);
    border-color: var(--accent-coral);
  }

  .cat-list {
    list-style: none;
    max-width: 480px;
    margin: 0 auto;
  }

  .cat-item {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--divider);
    cursor: pointer;
    transition: background 0.2s;
  }
  .cat-item:hover,
  .cat-item:active {
    background: rgba(217, 119, 87, 0.06);
  }
  .cat-item-no {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--accent-coral);
    min-width: 30px;
    letter-spacing: 0.05em;
  }
  .cat-item-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--text-main);
    flex: 1;
  }
  .cat-item-count {
    font-size: 10px;
    color: var(--text-muted);
    font-feature-settings: "tnum";
  }

  /* タブレット以上 */
  @media (min-width: 600px) {
    .block-text { font-size: 15px; line-height: 1.95; }
    .topic { font-size: 13.5px; }
    .card { padding: 28px 30px 32px; }
  }

  /* アクセシビリティ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <span class="cat-no" id="catNo"></span>
      <span class="cat-divider">|</span>
      <span class="cat-label" id="catLabel"></span>
    </div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <!-- プログレス -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- メニューボタン -->
  <button class="menu-btn" id="menuBtn" aria-label="メニュー">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <line x1="3" y1="7" x2="21" y2="7"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="17" x2="21" y2="17"/>
    </svg>
  </button>

  <!-- タップで次へ -->
  <div class="tap-area" id="tapArea"></div>

  <!-- ステージ -->
  <div class="stage">
    <article class="card" id="card">
      <div class="topic" id="topic"></div>
      <div class="block block-forgive">
        <div class="block-label label-forgive">forgive &amp; receive</div>
        <p class="block-text" id="forgiveText"></p>
      </div>
      <div class="block block-affirm">
        <div class="block-label label-affirm">manifest</div>
        <p class="block-text" id="affirmText"></p>
      </div>
    </article>
  </div>

  <!-- ナビ -->
  <div class="nav">
    <button class="nav-btn" id="prevBtn">&larr; prev</button>
    <span class="nav-tap-hint">tap to next</span>
    <button class="nav-btn" id="nextBtn">next &rarr;</button>
  </div>

  <!-- メニュー -->
  <div class="menu-overlay" id="menuOverlay">
    <button class="menu-close" id="menuClose">close</button>
    <div class="menu-title">わたしへ</div>
    <div class="menu-actions">
      <button class="menu-action-btn" id="shuffleAll">全体からランダム</button>
      <button class="menu-action-btn" id="resetOrder">最初から順に</button>
    </div>
    <ul class="cat-list" id="catList"></ul>
  </div>

  <script>
    const CARDS = [
  {
    "catNo": 1,
    "cat": "自己価値・存在感",
    "topic": "認められないと、ここにいてはいけない気がする",
    "forgive": "認められないと存在していてはいけない、という感覚を認めます。受け入れます。許します。誰かに認めてもらえないと、自分がここにいる理由がない気がして、いつも外側に承認を探してきたことを許します。それくらい、ちゃんと在ろうとしてきたわたしのことを認めます。わたしが存在しているということ自体が、すでに宇宙やたくさんの存在に認められているということなのだということを、わたしは認めます。許可します。",
    "affirm": "わたしは、わたしであるだけで、すでに完全に認められています。誰かの承認を探しに行かなくても、わたしはここにいていいのです。宇宙は、わたしの存在そのものを祝福しています。"
  },
  {
    "catNo": 1,
    "cat": "自己価値・存在感",
    "topic": "嫌われるのが怖くて、本音を飲み込む",
    "forgive": "嫌われるのが怖い、という感覚を認めます。受け入れます。許します。その恐れが、言いたいことを飲み込ませて、本音を奥にしまわせてきたことを許します。それくらい、人とのつながりを大切にしてきたわたしのことを認めます。本音を出しても嫌われないわたしがいること、むしろ本音を出すほど好かれていくわたしがいることを、わたしは認めます。許可します。",
    "affirm": "わたしは、本音を話します。本音のわたしは、ちゃんと愛されます。素直であればあるほど、わたしはより深いところで人とつながっていきます。"
  },
  {
    "catNo": 1,
    "cat": "自己価値・存在感",
    "topic": "自分を主張すると、関係が壊れる気がする",
    "forgive": "自分を主張すると関係が壊れる、と思ってきたことを認めます。受け入れます。許します。自分の意見を出すと嫌われる気がして、いつも相手に合わせてきたことを許します。それくらい、関係を守ろうとしてきたわたしのことを認めます。自分を主張することで、むしろ関係がより良くなっていくこともあるということを、わたしは認めます。許可します。",
    "affirm": "わたしは、自分を主張します。わたしが正直に自分を出すほど、関係はより本物になっていきます。わたしの声は、つながりを深めるものです。"

    "affirm": "わたしは、自分を主張しながら、平和の中にいられます。自分を消す必要はありません。わたしがそこに在ること自体が、健やかな平和を作っていきます。"
  },
  {
    "catNo": 1,
    "cat": "自己価値・存在感",

  },
  {
    "catNo": 1,

    "affirm": "どんなわたしでも、わたしは完璧です。揺れているわたしも、定まらないわたしも、そのままで美しいです。わたしは、どんな自分でいてもいいのです。"

  {

  },
  {
    "catNo": 1,
    "cat": "自己価値・存在感",

    "affirm": "できていても、できていなくても、わたしは素晴らしい存在です。わたしの価値は、行動の結果では変わりません。わたしは、何もしなくても、十分に価値があります。"
  },
  {

  },
  {
    "catNo": 1,

    CARDS.forEach((c, i) => {
      if (!categories[c.cat]) {
        categories[c.cat] = { no: c.catNo, name: c.cat, indices: [] };
      }
      categories[c.cat].indices.push(i);
    });

    // 開くたびにランダムから開始
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setOrder(indices, startRandom = true) {
      order = indices;
      currentIndex = startRandom
        ? Math.floor(Math.random() * order.length)
        : 0;
      render();
    }

    function render() {
      const card = CARDS[order[currentIndex]];
      document.getElementById('catNo').textContent =
        String(card.catNo).padStart(2, '0');
      document.getElementById('catLabel').textContent = card.cat;
      document.getElementById('progressText').textContent =
        `${currentIndex + 1} / ${order.length}`;
      document.getElementById('topic').textContent = card.topic;
      document.getElementById('forgiveText').textContent = card.forgive;
      document.getElementById('affirmText').textContent = card.affirm;
      document.getElementById('progressFill').style.width =
        ((currentIndex + 1) / order.length * 100) + '%';

      // 再アニメーション
      const cardEl = document.getElementById('card');
      cardEl.style.animation = 'none';
      cardEl.offsetHeight;
      cardEl.style.animation = '';
      cardEl.scrollTop = 0;

      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled =
        currentIndex === order.length - 1;
    }

    function next() {
      if (currentIndex < order.length - 1) {
        currentIndex++;
        render();
      }
    }

    function prev() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    // タップで次へ
    document.getElementById('tapArea').addEventListener('click', next);
    document.getElementById('nextBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      next();
    });
    document.getElementById('prevBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      prev();
    });

    // キーボードで操作
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') next();
      if (e.key === 'ArrowLeft') prev();
    });

    // スワイプ
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        if (dx < 0) next();
        else prev();
      }
    }, { passive: true });

    // メニュー
    const menuBtn = document.getElementById('menuBtn');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuClose = document.getElementById('menuClose');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menuOverlay.classList.add('open');
    });
    menuClose.addEventListener('click', () => {
      menuOverlay.classList.remove('open');
    });

    // カテゴリリスト構築
    const catList = document.getElementById('catList');
    Object.values(categories).forEach((cat) => {
      const li = document.createElement('li');
      li.className = 'cat-item';
      li.innerHTML = `
        <span class="cat-item-no">${String(cat.no).padStart(2, '0')}</span>
        <span class="cat-item-name">${cat.name}</span>
        <span class="cat-item-count">${cat.indices.length}</span>
      `;
      li.addEventListener('click', () => {
        setOrder(shuffleArray(cat.indices), false);
        menuOverlay.classList.remove('open');
      });
      catList.appendChild(li);
    });

    document.getElementById('shuffleAll').addEventListener('click', () => {
      setOrder(shuffleArray([...Array(CARDS.length).keys()]), false);
      menuOverlay.classList.remove('open');
    });
    document.getElementById('resetOrder').addEventListener('click', () => {
      setOrder([...Array(CARDS.length).keys()], true);
      menuOverlay.classList.remove('open');
    });

    // 初期表示: 全カードからランダムに開始
    setOrder(shuffleArray([...Array(CARDS.length).keys()]), false);
  </script>
</body>
</html>
