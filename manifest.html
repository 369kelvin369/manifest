<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしのマニフェスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:        #b02a1a;
    --orange:     #d45500;
    --gold:       #b87d00;
    --bg:         #fdf6e3;
    --white:      #ffffff;
    --text:       #0e0a04;
    --text-sub:   #3a2208;
    --muted:      #7a5a20;
    --forgive-bg: rgba(176,42,26,0.09);
    --affirm-bg:  rgba(184,125,0,0.11);
    --divider:    rgba(184,125,0,0.5);
    --card-border: 1.5px solid rgba(140,80,0,0.20);
    --card-shadow: 0 6px 28px rgba(100,50,0,0.16), 0 1px 4px rgba(100,50,0,0.08);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── プログレスバー ── */
  .progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(184,125,0,0.15);
    z-index: 200;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--red), var(--gold));
    transition: width 0.4s ease;
  }

  /* ── ヘッダー ── */
  .header {
    position: fixed;
    top: 3px; left: 0; right: 0;
    z-index: 100;
    height: 48px;
    padding: 0 20px;
    background: var(--bg);
    border-bottom: 1.5px solid rgba(184,125,0,0.25);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .category-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--red);
  }

  .progress-text {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
  }

  /* ── スクロールエリア ── */
  .card-viewport {
    position: fixed;
    top: 51px;
    bottom: 76px;
    left: 0; right: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── カード ── */
  .card {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 480px;
    border-radius: 18px;
    overflow: hidden;
    border: var(--card-border);
    box-shadow: var(--card-shadow);
    animation: fadeIn 0.35s ease;
    background: var(--white);
  }

  .card.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 許しブロック */
  .forgive-block {
    padding: 24px 22px 20px;
    background: var(--forgive-bg);
    border-bottom: 1.5px solid rgba(176,42,26,0.18);
  }

  .block-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    margin-bottom: 10px;
  }

  .forgive-block .block-label { color: var(--red); }
  .affirm-block  .block-label { color: var(--gold); }

  .forgive-block p {
    font-size: 14px;
    line-height: 2.1;
    color: #1c0a06;
    font-weight: 400;
  }

  /* 仕切り */
  .card-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 22px;
    background: var(--white);
    height: 34px;
    border-top: 1px solid rgba(140,80,0,0.10);
    border-bottom: 1px solid rgba(140,80,0,0.10);
  }
  .card-divider::before,
  .card-divider::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: var(--divider);
  }
  .card-divider span {
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
  }

  /* マニフェストブロック */
  .affirm-block {
    padding: 20px 22px 26px;
    background: var(--affirm-bg);
  }

  .affirm-block p {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    line-height: 2.1;
    color: #0a0600;
    font-weight: 700;
  }

  /* ── ナビゲーション ── */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 76px;
    padding: 10px 16px 22px;
    background: var(--bg);
    border-top: 1.5px solid rgba(184,125,0,0.25);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    z-index: 100;
  }

  .nav-btn {
    background: var(--white);
    border: 1.5px solid rgba(184,125,0,0.4);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 10px 20px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    min-width: 76px;
    box-shadow: 0 2px 6px rgba(100,50,0,0.08);
  }

  .nav-btn:active {
    background: rgba(184,125,0,0.06);
  }

  .nav-btn.next {
    background: linear-gradient(135deg, var(--red), var(--orange));
    border: none;
    color: #fff;
    padding: 10px 28px;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(176,42,26,0.30);
  }

  .nav-btn.next:active {
    box-shadow: 0 2px 6px rgba(176,42,26,0.20);
    transform: translateY(1px);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
    box-shadow: none;
    transform: none;
  }

  /* ── メニューボタン ── */
  .menu-btn {
    background: var(--white);
    border: 1.5px solid rgba(184,125,0,0.4);
    color: var(--muted);
    font-size: 16px;
    font-weight: 400;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 40px;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(100,50,0,0.08);
  }
  .menu-btn:active {
    background: rgba(184,125,0,0.06);
  }

  /* ── カテゴリメニュー ── */
  .menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    overflow-y: auto;
  }
  .menu-overlay.open { display: block; }

  .menu-header {
    position: sticky;
    top: 0;
    background: linear-gradient(135deg, var(--red), var(--orange));
    color: #fff;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
  }

  .menu-close {
    background: none;
    border: 1.5px solid rgba(255,255,255,0.6);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 5px 14px;
    border-radius: 20px;
  }

  .menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 6px;
  }

  .menu-item {
    padding: 14px 16px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    border: 1.5px solid rgba(184,125,0,0.2);
    transition: border-color 0.15s;
  }
  .menu-item:active {
    border-color: var(--gold);
    background: rgba(184,125,0,0.06);
  }

  .menu-item-num {
    font-size: 11px;
    color: var(--red);
    font-weight: 700;
    min-width: 18px;
  }
  .menu-item-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
  }
  .menu-item-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
  }

  /* ── 完了画面 ── */
  .complete-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 400;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px;
    text-align: center;
  }
  .complete-screen.show { display: flex; }

  .complete-icon { font-size: 52px; }

  .complete-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    color: var(--red);
    font-weight: 700;
    line-height: 1.9;
  }
  .complete-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 2.2;
  }
  .complete-restart {
    margin-top: 8px;
    background: linear-gradient(135deg, var(--red), var(--orange));
    border: none;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(176,42,26,0.30);
    letter-spacing: 0.05em;
  }
  .complete-restart:active {
    box-shadow: 0 2px 6px rgba(176,42,26,0.20);
    transform: translateY(1px);
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }
</style>
</head>
<body>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar"></div>
</div>

<div class="header">
  <span class="category-label" id="categoryLabel">❶ 自己価値・存在感</span>
  <span class="progress-text" id="progressText">1 / 1</span>
</div>

<div class="card-viewport" id="cardViewport"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 前へ</button>
  <button class="menu-btn" onclick="openMenu()">☰</button>
  <button class="nav-btn next" id="nextBtn" onclick="navigate(1)">次へ →</button>
</div>

<!-- カテゴリメニュー -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-header">
    <span>カテゴリを選ぶ</span>
    <button class="menu-close" onclick="closeMenu()">✕ 閉じる</button>
  </div>
  <ul class="menu-list" id="menuList"></ul>
</div>

<!-- 完了画面 -->
<div class="complete-screen" id="completeScreen">
  <div class="complete-icon">✦</div>
  <p class="complete-title">すべて読み終わりました。<br>わたしはすでに、大丈夫です。</p>
  <p class="complete-sub">今日もわたしをわたしに<br>許してくれてありがとう。</p>
  <button class="complete-restart" onclick="restart()">最初から読む</button>
</div>

<script>
const data = [
  {
    category: "❶ 自己価値・存在感",
    cards: [
      { forgive: "わたしは認められないと存在していられないと感じることを許します。わたしが存在しているということは宇宙や神様、たくさんの存在たちに認められているということをわたしは認めます。許可します。", affirm: "わたしはわたしであるだけで、すでに完全に認められています。宇宙はわたしの存在を祝福しています。" },
      { forgive: "嫌われることへの恐れを許します。その恐れが本音を飲み込ませることがあるのを認めます。すべて許します。すべて愛おしいです。本音を出したとしても、嫌われない自分がいること、本音を出すことでむしろ好かれる自分がいることをわたしは認めます。許可します。", affirm: "わたしは本音を話します。本音のわたしは愛されます。本音であるほど、わたしはより深く愛されます。" },
      { forgive: "自分を主張すると関係が壊れると思っている自分を許します。自分を主張することでむしろ関係がより良くなる自分もいることを受け入れます。肯定します。許可します。", affirm: "わたしは自分を主張します。わたしが自分を主張するほど、関係はより豊かになります。" },
      { forgive: "対立することへの罪悪感を認めます。受け入れます。許します。平和を保つために自分を消すわたしがいることを許します。対立しても大丈夫です。自分を消さなくても、自分を主張しても、平和を保つことができること、平和でいられることを許します。許可します。", affirm: "わたしは自分を主張しながら、平和の中にいます。わたしの存在が、平和を作ります。" },
      { forgive: "自分の価値を、他者の反応で測ってしまうわたしを認めます。受け入れます。許します。自分の価値を自分で決めて良い、自分の価値は自分が思ったまま、高い価値が自分にあるということをわたしは認めます。許可します。わたしにはとても高い価値があり、それは絶対的です。", affirm: "わたしの価値はわたしが決めます。わたしの価値は絶対的に高く、何があっても変わりません。" },
      { forgive: "どんな自分で在ればいいかわからなくなる。自己像が揺れることがあるのを認めます。受け入れます。許します。どんな自分でも、わたしは完璧で、素晴らしい存在です。どんなわたしでいてもいいです。すべてを許します。許可します。", affirm: "どんなわたしでも、わたしは完璧です。どんな状態のわたしも、そのままで美しいです。" },
      { forgive: "わたしは中途半端な存在な氣がするという感覚をすべて認めます。受け入れます。許します。わたしは常に完璧な存在です。どんなときも完璧なわたしであり、完璧な流れにいて、完璧な場所にいて、完璧なわたしを生きています。すべて完璧です。許可します。", affirm: "わたしは常に完璧な存在です。完璧な流れの中に、完璧なわたしがいます。" },
      { forgive: "ちゃんとできていないとダメだという内なる声があることを認めます。受け入れます。許します。ちゃんとできていなくてもわたしはすばらしい存在であるということを認めます。許可します。", affirm: "できていてもできていなくても、わたしは素晴らしい存在です。わたしの価値は行動の結果で変わりません。" },
      { forgive: "自分が特別すぎて、どこにも属せない感覚があることを認めます。受け入れます。許します。どこかに所属できていなくてもわたしはすばらしい存在で、ありのまま自然なわたしを生きていて、それでいいのだということを受け入れます。許可します。わたしは独立した存在で、それはとても素晴らしいことです。", affirm: "わたしは独立した存在です。どこにも属さなくていい。それがわたしの自由であり、強さです。" },
      { forgive: "深すぎる自分を普通に見せようとして消耗している自分がいることをすべて認めます。受け入れます。許します。自分を普通に見せようとしている自分もすべて愛おしいです。ありのままのわたしをただありのまま、自然に見せてもいいということをわたしはわたしに許可します。", affirm: "ありのままのわたしが、わたしの最大の魅力です。深いわたしをそのまま見せます。" },
      { forgive: "目立つのが怖いのに、目立ちたい氣持ちもある、この矛盾を持ち続けていることをすべて認めます。受け入れます。許します。目立つことが怖くてもいいし、目立っても良いです。どんなわたしも素晴らしくて、素敵です。わたしのすべてを許します。許可します。", affirm: "わたしは目立ちます。輝きます。それがわたしの自然な姿です。" },
      { forgive: "勝利や達成への執着と、それを求めることへの罪悪感が共存しているわたしを認めます。受け入れます。許します。純粋にただ目的を叶えたいと思っていいし、ただ叶えていいです。わたしにはその価値があります。目的を叶えたいと思う氣持ち、叶えているわたしをすべて許します。許可します。", affirm: "わたしは達成します。勝利します。それを望むわたしは純粋で、美しいです。" },
      { forgive: "周囲に合わせすぎて、自分がどこにいるかわからなくなることがあることを認めます。受け入れます。許します。周りとの調和を図るわたしをわたしは誇らしく思います。同時にただ自分を主張して、自分が目立ったり、自分の存在が前にでることも許します。すべて完璧です。許可します。", affirm: "わたしはわたしであり、同時に周りと調和します。自分を出しながら、美しい関係を作ります。" },

      { forgive: "わたしは「難しい人」「扱いにくい人」と思われることを恐れていることを許します。わたしの複雑さは欠点ではなく、豊かさであることを認めます。許可します。", affirm: "わたしの複雑さは豊かさです。わたしをわかってくれる人がいます。" },

      { forgive: "価値を受け取るのが怖いわたしを認めます。受け入れます。許します。受け取る資格があるのかわからないという感覚も認めます。受け入れます。許します。価値を受け取ることが怖くても、受け取ってもいいです。わたしには宇宙の中心と同じとても高い価値があります。わたしが価値を受け取ることはわたしの存在の価値の高さの証明です。", affirm: "わたしは価値を受け取ります。受け取ることはわたしの自然な姿です。わたしの存在が、受け取る理由です。" },

// ── フラット化 ──
let allCards = [];
let categoryStartIndex = [];

data.forEach((cat, ci) => {
  categoryStartIndex.push(allCards.length);
  cat.cards.forEach((card, ki) => {
    allCards.push({ ...card, category: cat.category, catIndex: ci, cardIndex: ki });
  });
});

let current = 0;

function buildCards() {
  const vp = document.getElementById('cardViewport');
  allCards.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'card' + (i === 0 ? ' active' : '');
    div.id = 'card-' + i;
    div.innerHTML = `
      <div class="forgive-block">
        <div class="block-label">許し・受け入れ</div>
        <p>${c.forgive}</p>
      </div>
      <div class="card-divider"><span>✦</span></div>
      <div class="affirm-block">
        <div class="block-label">マニフェスト</div>
        <p>${c.affirm}</p>
      </div>
    `;
    vp.appendChild(div);
  });
}

function buildMenu() {
  const list = document.getElementById('menuList');
  data.forEach((cat, ci) => {
    const li = document.createElement('li');
    li.className = 'menu-item';
    li.innerHTML = `
      <span class="menu-item-num">${ci + 1}</span>
      <span class="menu-item-name">${cat.category}</span>
      <span class="menu-item-count">${cat.cards.length}枚</span>
    `;
    li.onclick = () => {
      jumpTo(categoryStartIndex[ci]);
      closeMenu();
    };
    list.appendChild(li);
  });
}

function update() {
  const c = allCards[current];
  document.querySelectorAll('.card').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  document.getElementById('categoryLabel').textContent = c.category;
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + allCards.length;
  document.getElementById('progressBar').style.width = ((current + 1) / allCards.length * 100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').textContent = current === allCards.length - 1 ? '完了 ✦' : '次へ →';
}

function navigate(dir) {
  if (dir === 1 && current === allCards.length - 1) {
    document.getElementById('completeScreen').classList.add('show');
    return;
  }
  const next = current + dir;
  if (next < 0 || next >= allCards.length) return;
  current = next;
  update();
}

function jumpTo(index) {
  current = index;
  update();
}

function openMenu()  { document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }

function restart() {
  document.getElementById('completeScreen').classList.remove('show');
  current = 0;
  update();
}

// ── 初期化 ──
buildCards();
buildMenu();
update();
</script>
